<label>
	HMAC<br>
	<small>Per-team flag: PREFIX{HMAC-SHA256(secret, account_id)[:16]}. Prefix is set per deployment via the HMAC_FLAG_PREFIX env var (default pbctf).</small>
</label>
<div class="form-group">
	<input type="text" class="form-control" name="content" value="{{ content }}" placeholder="Challenge secret (keep private)">
</div>
<div class="form-group">
	<input type="text" class="form-control" name="data" value="{{ data }}" placeholder="Redirect URL for the /hmac/ticket link (optional)">
</div>
<input type="hidden" name="type" value="hmac">
